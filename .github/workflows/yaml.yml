---
name: yml

on:
  push:
    branches:
      - 'main'
    paths:
      - '**.yaml'
      - '**.yml'
  pull_request:
    paths:
      - '**.yaml'
      - '**.yml'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run yamllint
        uses: ibiqlik/action-yamllint@v3
