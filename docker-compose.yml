---
services:
  hugo:
    container_name: hugo
    image: hugomods/hugo:base-0.163.2
    network_mode: "host"
    volumes:
      - ./src:/src

  vale:
    image: docker.io/grafana/vale:4dbecae7443c69b3e5fdfeeac7037a339cb82e4c
    container_name: vale
    volumes:
      - .:/data:ro
      - ./styles:/data/styles
      - ./config:/data/styles/config:ro
    working_dir: /data

  markdownlint:
    container_name: markdownlint
    image: registry.gitlab.com/pipeline-components/markdownlint:latest
    volumes:
      - ./:/code:ro
      - /code/src/themes/
      - /code/styles/

  yamllint:
    container_name: yamllint
    image: registry.gitlab.com/pipeline-components/yamllint:latest
    volumes:
      - ./:/code:ro

  tflint:
    container_name: tflint
    image: ghcr.io/terraform-linters/tflint:v0.63.0
    volumes:
      - ./infrastructure/terraform/:/data:ro
